site_name: MaaS — Memory as a Service
site_description: Documentação técnica do MaaS (Memory as a Service) e do módulo Sentinela Ambiental — PI-III TADS FAESA
site_author: Dyone Nunes de Andrade
docs_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Tema claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Tema escuro
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Início: index.md
  - Arquitetura: arquitetura.md
  - Instalação e Execução: instalacao.md
  - MaaS Core (C++): maas-core.md
  - Contrato gRPC: api-grpc.md
  - Banco de Dados: banco-de-dados.md
  - Dashboard: dashboard.md
  - Sentinela Ambiental (Consumidor):
      - Visão Geral: consumidor/index.md
      - Pipeline de Dados: consumidor/pipeline.md
      - API e Interface 3D: consumidor/api.md
  - Guias:
      - Manual do Usuário: guias/manual-usuario.md
      - Manual do Desenvolvedor: guias/manual-desenvolvedor.md

exclude_docs: |
  Manualv2.md
  MANUAL_DESENVOLVEDOR.md
  Entrega1_Relatorio.md
  *.pdf
